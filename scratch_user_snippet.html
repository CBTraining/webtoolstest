<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTools</title>
    
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    
    <!-- FFmpeg.wasm for Video Compressor (v0.12.10 wrapper, using native fetch for core) -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'accent': '#34A853',
                        'accent-hover': '#2c8d48',
                        'bg-page': 'transparent', 
                        'bg-sidebar': 'var(--bg_sidebar)',
                        'bg-card': 'var(--bg_card)',
                        'border-default': 'var(--border_default)',
                        'bg-input': 'var(--bg_input)',
                        'slate': {
                            600: '#3d3754',
                            700: '#2c283d',
                            800: '#1e1b29',
                            900: '#13111a',
                            950: '#0a090e',
                        }
                    },
                    fontFamily: {
                        sans: ['Ubuntu', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --text_primary: #1b1c1f;
            --text_secondary: #4b5563;
            --bg_page: #f8fafc;
            --bg_sidebar: rgba(255, 255, 255, 0.65);
            --bg_card: rgba(255, 255, 255, 0.55);
            --border_default: rgba(255, 255, 255, 0.6);
            --bg_input: rgba(255, 255, 255, 0.4);
            --hover_item: rgba(255, 255, 255, 0.6);
            --glass_shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            --glass_blur: blur(16px);
        }

        html.dark {
            --text_primary: #f8fafc;
            --text_secondary: #a7a5b4;
            --bg_page: #0a090e; 
            --bg_sidebar: rgba(10, 9, 14, 0.65);
            --bg_card: rgba(19, 17, 26, 0.45);
            --border_default: rgba(255, 255, 255, 0.08);
            --bg_input: rgba(0, 0, 0, 0.4);
            --hover_item: rgba(255, 255, 255, 0.05);
            --glass_shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --glass_blur: blur(20px);
        }

        .preload * { transition: none !important; }

        body { 
            font-family: 'Ubuntu', sans-serif; 
            background-color: var(--bg_page); 
            color: var(--text_primary); 
            transition: background-color 0.3s, color 0.3s; 
            overflow: hidden; 
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }
        body::before {
            width: 50vw; height: 50vw;
            background: #34A853; 
            top: -15vw; left: -15vw;
        }
        body::after {
            width: 40vw; height: 40vw;
            background: #3b82f6; 
            bottom: -10vw; right: -10vw;
            animation-delay: -10s;
        }
        html.dark body::before { background: #14532d; opacity: 0.2; filter: blur(120px); }
        html.dark body::after { background: #4c1d95; opacity: 0.25; filter: blur(120px); }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vw, 10vw) scale(1.2); }
        }

        .sidebar { 
            background-color: var(--bg_sidebar); 
            border-right: 1px solid var(--border_default); 
            backdrop-filter: var(--glass_blur);
            -webkit-backdrop-filter: var(--glass_blur);
            transition: all 0.3s ease; 
        }

        /* Sidebar Drag Highlight */
        .sidebar.drag-over {
            background-color: rgba(52, 168, 83, 0.1) !important;
            border-color: #34A853 !important;
            box-shadow: inset -5px 0 20px rgba(52, 168, 83, 0.2);
        }

        .tool-card { 
            background-color: var(--bg_card); 
            border: 1px solid var(--border_default); 
            border-radius: 1rem; 
            box-shadow: var(--glass_shadow); 
            backdrop-filter: var(--glass_blur);
            -webkit-backdrop-filter: var(--glass_blur);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s; 
        }
        
        .nav-item { color: var(--text_secondary); transition: all 0.3s ease; font-weight: 500; cursor: pointer; user-select: none; position: relative; overflow: hidden; }
        .nav-item::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: #34A853; transform: scaleY(0); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); transform-origin: center; opacity: 0; border-radius: 0 4px 4px 0; }
        .nav-item:hover:not(.active) { background-color: var(--hover_item); color: #34A853; }
        .nav-item.active { color: #34A853; background: linear-gradient(90deg, var(--hover_item) 0%, transparent 100%); font-weight: 600; }
        .nav-item.active::before { transform: scaleY(1); opacity: 1; }
        .nav-item i { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .nav-item:hover i { transform: scale(1.15) rotate(-5deg); }

        .tool-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px -10px rgba(0,0,0,0.1); }
        html.dark .tool-card:hover { box-shadow: 0 12px 30px -10px rgba(0,0,0,0.6); border-color: #4a4d52; }

        button.bg-accent { background: linear-gradient(135deg, #3aa856 0%, #298741 100%); background-size: 200% 200%; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        button.bg-accent:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(52, 168, 83, 0.4); background-position: 100% 100%; }
        button.bg-accent:active { transform: translateY(1px); box-shadow: 0 5px 10px -5px rgba(52, 168, 83, 0.4); }

        .border-dashed { transition: all 0.3s ease; position: relative; overflow: hidden; }
        .border-dashed:hover, .border-dashed.drag-active { background-color: var(--hover_item); border-color: #34A853; }
        .border-dashed:hover i, .border-dashed.drag-active i { transform: translateY(-6px) scale(1.1); color: #34A853; opacity: 1; }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .toast {
            animation: slideUpFade 0.3s ease-out forwards;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .tool-section .grid > div { opacity: 0; }
        .tool-section.animate-in .grid > div { animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .tool-section.animate-in .grid > div:nth-child(1) { animation-delay: 0.05s; }
        .tool-section.animate-in .grid > div:nth-child(2) { animation-delay: 0.15s; }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; transition: background-color 0.2s; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        html.dark .custom-scroll::-webkit-scrollbar-thumb { background-color: #475569; }
        html.dark .custom-scroll::-webkit-scrollbar-thumb:hover { background-color: #64748b; }

        input[type="text"], input[type="number"], textarea, select { 
            background-color: var(--bg_input); 
            border: 1px solid var(--border_default); 
            color: var(--text_primary); 
            border-radius: 0.75rem; 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s; 
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #34A853; box-shadow: 0 0 0 3px rgba(52, 168, 83, 0.15); }

        input[type=range]::-webkit-slider-runnable-track { background: var(--border_default); border-radius: 4px; height: 6px; transition: background 0.3s; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #34A853; margin-top: -6px; cursor: pointer; box-shadow: 0 0 0 2px var(--bg_card); transition: transform 0.2s; }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .bg-dots {
            background-color: var(--bg_input);
            background-image: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            backdrop-filter: blur(4px);
        }
        html.dark .bg-dots { background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px); }
        
        .image-preview-box { min-height: 240px; border: 2px dashed var(--border_default); display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 1rem; position: relative; transition: all 0.3s; }
        .image-preview-box img, .image-preview-box video { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 4px 6px rgb(0 0 0 / 0.1)); transition: transform 0.3s; }
        .image-preview-box:hover img { transform: scale(1.02); }
    </style>
</head>
<body class="h-screen w-full preload relative bg-page text-[var(--text_primary)]">
